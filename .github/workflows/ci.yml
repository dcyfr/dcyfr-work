# CI gate — typecheck + lint + build on every PR.
#
# This supersedes ad-hoc per-branch validation. Matrix runs the three
# checks in parallel; fail-fast is false so engineers see all three
# statuses on a PR, not just the first failure.
#
# The Design Tokens workflow (design-tokens.yml) is a sibling gate that
# runs the dcyfr-local ESLint rules + identity-clobber CSS sniff on
# design-sensitive paths. The Visual Regression workflow
# (visual-regression.yml) gates on successful Vercel preview deploys.
#
# Referenced from openspec/changes/dcyfr-sites-design-parity Phase 3.1-3.3
# and openspec/specs/dcyfr-site-scaffold §Required scripts.

name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    name: ${{ matrix.check }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        check: [typecheck, lint, build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ${{ matrix.check }}
        run: npm run ${{ matrix.check }}
        env:
          NEXT_TELEMETRY_DISABLED: '1'
