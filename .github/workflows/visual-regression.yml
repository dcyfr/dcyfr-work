# Visual regression gate for Vercel preview deployments.
#
# Fires on every `deployment_status` event from Vercel; filters to successful
# Preview deploys and runs Playwright snapshots against the preview URL. On
# failure, the playwright-report/ and test-results/ directories are uploaded
# as artifacts so Drew (or scout) can diff locally.
#
# Related:
# - openspec/changes/dcyfr-skeleton-sites-scaffolding/spec.md#5-polish-loop
# - e2e/snapshots.spec.ts (routes + viewports)
# - playwright.config.ts (baseURL reads BASE_URL)
#
# Manual runs: workflow_dispatch accepts a `base_url` override for debugging.

name: Visual Regression

on:
  deployment_status:
  workflow_dispatch:
    inputs:
      base_url:
        description: Preview URL to run snapshots against
        required: true
        type: string

concurrency:
  group: visual-regression-${{ github.event.deployment_status.target_url || inputs.base_url }}
  cancel-in-progress: true

jobs:
  snapshots:
    name: Playwright snapshots
    runs-on: ubuntu-latest
    # Gate on Vercel preview success. Manual dispatch skips the gate.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'deployment_status' &&
       github.event.deployment_status.state == 'success' &&
       github.event.deployment.environment == 'Preview')
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium

      - name: Resolve BASE_URL
        id: base
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "url=${{ inputs.base_url }}" >> "$GITHUB_OUTPUT"
          else
            echo "url=${{ github.event.deployment_status.target_url }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run snapshot suite
        env:
          BASE_URL: ${{ steps.base.outputs.url }}
          CI: "true"
        run: npm run test:snapshots

      - name: Upload playwright-report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
          if-no-files-found: ignore
